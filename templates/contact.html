{% extends 'base.html' %}

{% block content %}

<main class="container my-5">
    <div class="page-header">
        <h1 class="page-title">Na Kontakto</h1>
        <p class="page-subtitle">Dërgo një mesazh për pyetje, sugjerime ose përmirësime mbi projektin.</p>
    </div>

    {% if success %}
    <div class="alert alert-success text-center mx-auto mb-4" style="max-width: 720px;">
        Mesazhi u dërgua me sukses.
    </div>
    {% endif %}

    <div class="row justify-content-center">
        <div class="col-lg-7">
            <form method="post" class="content-card">
                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label">Emri</label>
                    <input type="text" name="name" class="form-control" placeholder="Shkruaj emrin" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" name="email" class="form-control" placeholder="Shkruaj email-in" required>
                </div>

                <div class="mb-4">
                    <label class="form-label">Mesazhi</label>
                    <textarea name="message" class="form-control" rows="4" placeholder="Shkruaj mesazhin" required></textarea>
                </div>

                <button type="submit" class="btn btn-success w-100">
                    Dërgo Mesazhin
                </button>
            </form>
        </div>
    </div>
</main>

{% endblock %}
